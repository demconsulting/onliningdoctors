<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Doctors Onlining — Video Consultations with Qualified Doctors</title>
    <meta name="description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
    <meta name="author" content="Doctors Onlining" />
    <meta name="theme-color" content="#00AEEF" />
    <meta name="color-scheme" content="light" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Doctors">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Performance: connect early to backend so first auth/data round-trip is faster -->
    <link rel="preconnect" href="https://ufgbavxidpmikiwicifv.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://ufgbavxidpmikiwicifv.supabase.co">

    <!-- Performance: Google Fonts (loaded via @import in index.css) needs early DNS + TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- LCP: preload the hero background image so it starts downloading immediately.
         Use imagesrcset/imagesizes so mobile fetches the small variant and desktop the full one. -->
    <link
      rel="preload"
      as="image"
      href="/src/assets/hero-bg.webp"
      imagesrcset="/src/assets/hero-bg-mobile.webp 768w, /src/assets/hero-bg.webp 1920w"
      imagesizes="(max-width: 768px) 100vw, 1920px"
      fetchpriority="high"
      type="image/webp"
    >
    <!-- Discover the font stylesheet earlier than @import in CSS would.
         Trimmed to only the weights actually used (600/700/800 display, 400/500/600/700 body). -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Doctors Onlining — Video Consultations with Qualified Doctors">
    <meta property="og:description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
    <meta property="og:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/cc0c1d02-8799-460c-b6d9-f7a1c059cfe4/id-preview-17a6bbd2--727c4868-8e40-4bbb-94cb-b9a28a54c514.lovable.app-1772383313363.png">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@OnliningDoctors" />
    <meta name="twitter:title" content="Doctors Onlining — Video Consultations with Qualified Doctors">
    <meta name="twitter:description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
    <meta name="twitter:image" content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/cc0c1d02-8799-460c-b6d9-f7a1c059cfe4/id-preview-17a6bbd2--727c4868-8e40-4bbb-94cb-b9a28a54c514.lovable.app-1772383313363.png">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
