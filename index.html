<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Doctors Onlining — Video Consultations with Qualified Doctors</title>
    <meta name="description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
    <meta name="author" content="Doctors Onlining" />
    <meta name="theme-color" content="#00AEEF" />
    <meta name="color-scheme" content="light" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/site.webmanifest">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Doctors">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Performance: connect early to backend so first auth/data round-trip is faster -->
    <link rel="preconnect" href="https://ufgbavxidpmikiwicifv.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://ufgbavxidpmikiwicifv.supabase.co">

    <!-- Performance: Google Fonts (loaded via @import in index.css) needs early DNS + TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- LCP: per-device hero preloads. Mobile gets the tiny ~11KB WebP so it
         can become LCP without a separate network round-trip; desktop preloads
         the full-resolution backdrop. Each is gated by a media query so the
         browser only downloads the variant for the current viewport. -->
    <link
      rel="preload"
      as="image"
      href="/hero-bg-mobile.webp"
      fetchpriority="high"
      type="image/webp"
      media="(max-width: 767px)"
    >
    <link
      rel="preload"
      as="image"
      href="/hero-bg.webp"
      fetchpriority="high"
      type="image/webp"
      media="(min-width: 768px)"
    >
    <!-- Discover the font stylesheet earlier than @import in CSS would.
         Trimmed to only the weights actually used (600/700/800 display, 400/500/600/700 body). -->
    <!-- Preload only the primary above-the-fold weights (display 800 for H1, body 400). Remaining weights load via the stylesheet with font-display: swap. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Inter:wght@400&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Inter:wght@400&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    
    
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/26a2dfa4-68d6-4c21-87a8-64e7c2327b0c">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@OnliningDoctors" />
    
    
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/26a2dfa4-68d6-4c21-87a8-64e7c2327b0c">
    <meta property="og:title" content="Doctors Onlining — Video Consultations with Qualified Doctors">
  <meta name="twitter:title" content="Doctors Onlining — Video Consultations with Qualified Doctors">
  <meta property="og:description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
  <meta name="twitter:description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
