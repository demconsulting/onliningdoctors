<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Doctors Onlining — Video Consultations with Qualified Doctors</title>
    <meta name="description" content="Doctors Onlining is a video consultation platform connecting patients with qualified doctors for non-emergency care.">
    <meta name="author" content="Doctors Onlining" />
    <meta name="theme-color" content="#00AEEF" />
    <meta name="color-scheme" content="light" />

    <!-- PWA / installability -->
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Doctors">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Performance: connect early to backend so first auth/data round-trip is faster -->
    <link rel="preconnect" href="https://ufgbavxidpmikiwicifv.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://ufgbavxidpmikiwicifv.supabase.co">

    <!-- Performance: Google Fonts (loaded via @import in index.css) needs early DNS + TLS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- LCP: hero image is preloaded with fetchpriority="high" inside the React HeroSection
         using the responsive <picture>/srcset markup. The Vite-hashed asset URLs prevent us
         from declaring a static preload here, so we rely on early in-DOM discovery instead. -->
    <!-- Discover the font stylesheet early. Single request — no duplicate preload+stylesheet pair. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap"></noscript>

    <!-- Open Graph / Twitter -->
